<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Interactive Clickable Map of Georgia TDP Regions</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n        }\n        .map-container {\n            position: relative;\n            width: 100%;\n            max-width: 800px;\n            margin: auto;\n            overflow: hidden;\n        }\n        .region {\n            position: absolute;\n            border: 2px solid white;\n            cursor: pointer;\n            transition: all 0.3s;\n        }\n        .region:hover {\n            opacity: 0.8;\n        }\n        /* Add region styles with coordinates*/\n        .nwg {\n            width: 20%;\n            height: 20%;\n            background-color: blue;\n            top: 10%;\n            left: 0;\n        }\n        .gm {\n            width: 15%;\n            height: 15%;\n            background-color: blue;\n            top: 5%;\n            left: 20%;\n        }\n        .neg {\n            width: 20%;\n            height: 20%;\n            background-color: blue;\n            top: 10%;\n            left: 40%;\n        }\n        .arc {\n            width: 15%;\n            height: 15%;\n            background-color: green;\n            top: 6%;\n            left: 70%;\n        }\n        .trrc {\n            width: 12%;\n            height: 12%;\n            background-color: blue;\n            top: 20%;\n            left: 70%;\n        }\n        .csra {\n            width: 20%;\n            height: 20%;\n            background-color: green;\n            top: 25%;\n            left: 30%;\n        }\n        .mg {\n            width: 18%;\n            height: 18%;\n            background-color: blue;\n            top: 35%;\n            left: 40%;\n        }\n        .hog {\n            width: 20%;\n            height: 20%;\n            background-color: blue;\n            top: 50%;\n            left: 15%;\n        }\n        .rv {\n            width: 20%;\n            height: 20%;\n            background-color: green;\n            top: 40%;\n            left: 45%;\n        }\n        .swg {\n            width: 15%;\n            height: 15%;\n            background-color: blue;\n            top: 55%;\n            left: 25%;\n        }\n        .sg {\n            width: 20%;\n            height: 20%;\n            background-color: green;\n            top: 70%;\n            left: 30%;\n        }\n        .coastal {\n            width: 20%;\n            height: 20%;\n            background-color: green;\n            top: 75%;\n            left: 55%;\n        }\n    </style>\n</head>\n<body>\n<h1>Georgia TDP Regions</h1>\n<div class=\"map-container\">\n    <div class=\"region nwg\" onclick=\"window.open('https://regionaltdp-gdot.hub.arcgis.com/pages/e07f5c940bff447aaf0285ecc7f06969/#NWGRC')\"></div>\n    <div class=\"region gm\" onclick=\"window.open('https://regionaltdp-gdot.hub.arcgis.com/pages/e07f5c940bff447aaf0285ecc7f06969/#GMRC')\"></div>\n    <div class=\"region neg\" onclick=\"window.open('https://regionaltdp-gdot.hub.arcgis.com/pages/e07f5c940bff447aaf0285ecc7f06969/#NEGRC')\"></div>\n    <div class=\"region arc\" onclick=\"window.open('https://atlantaregional.org/what-we-do/transportation-planning/metropolitan-transportation-plan/')\"></div>\n    <div class=\"region trrc\" onclick=\"window.open('https://regionaltdp-gdot.hub.arcgis.com/pages/e07f5c940bff447aaf0285ecc7f06969/#TRRC')\"></div>\n    <div class=\"region csra\" onclick=\"window.open('https://regionaltdp-gdot.hub.arcgis.com/pages/e07f5c940bff447aaf0285ecc7f06969/#CSRA')\"></div>\n    <div class=\"region mg\" onclick=\"window.open('https://regionaltdp-gdot.hub.arcgis.com/pages/e07f5c940bff447aaf0285ecc7f06969/#MGRC')\"></div>\n    <div class=\"region hog\" onclick=\"window.open('https://regionaltdp-gdot.hub.arcgis.com/pages/e07f5c940bff447aaf0285ecc7
